<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>채팅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a34;
      --accent: #7c6af7;
      --accent2: #4fd1a8;
      --text: #e8e8f0;
      --muted: #5a5a70;
      --system: #3a3a50;
      --danger: #f76a6a;
      --radius: 6px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-box {
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-box h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .login-box h1 span { color: var(--accent); }

    .login-box p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'IBM Plex Mono', monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-join {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-join:hover { opacity: 0.85; }

    /* ── APP LAYOUT ── */
    #app {
      display: none;
      height: 100%;
      flex-direction: row;
    }

    #app.active { display: flex; }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .sidebar-header .room-tag {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-header .room-tag b { color: var(--text); }

    .sidebar-section {
      padding: 14px 18px 6px;
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #user-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
    }

    .user-item .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      flex-shrink: 0;
    }

    .user-item.me .dot { background: var(--accent); }

    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }

    .btn-leave {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-leave:hover { border-color: var(--danger); color: var(--danger); }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .chat-header .hash {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      color: var(--muted);
    }

    .chat-header .room-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      font-weight: 600;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* MESSAGE BUBBLES */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 10px;
    }

    .msg-group:first-child { margin-top: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 0 0 4px;
    }

    .msg-meta .username {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
    }

    .msg-meta.mine .username { color: var(--accent2); }

    .msg-meta .time {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
    }

    .msg-bubble {
      display: inline-block;
      max-width: 70%;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .msg-group.mine { align-items: flex-end; }
    .msg-group.mine .msg-bubble {
      background: #2a2060;
      border-color: #3d2e90;
      color: #ddd8ff;
    }

    .msg-system {
      text-align: center;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      padding: 6px 0;
    }

    /* TYPING INDICATOR */
    #typing-indicator {
      padding: 4px 24px 8px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      min-height: 24px;
    }

    /* INPUT AREA */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
    }

    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'IBM Plex Sans KR', sans-serif;
      outline: none;
      resize: none;
      max-height: 120px;
      transition: border-color 0.15s;
      line-height: 1.4;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .btn-send {
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .btn-send:hover { opacity: 0.85; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>// <span>채팅</span></h1>
    <p>닉네임과 채팅방 이름을 입력하고 입장하세요.</p>
    <div class="field">
      <label>닉네임</label>
      <input id="input-username" type="text" placeholder="나는누구" maxlength="20" />
    </div>
    <div class="field">
      <label>채팅방</label>
      <input id="input-room" type="text" placeholder="general" maxlength="30" />
    </div>
    <button class="btn-join" onclick="joinChat()">입장 →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">// CHAT</div>
      <div class="room-tag">방: <b id="sidebar-room">-</b></div>
    </div>
    <div class="sidebar-section">참여자</div>
    <div id="user-list"></div>
    <div class="sidebar-footer">
      <button class="btn-leave" onclick="leaveChat()">← 나가기</button>
    </div>
  </aside>

  <div class="chat-area">
    <div class="chat-header">
      <span class="hash">#</span>
      <span class="room-name" id="header-room">-</span>
    </div>

    <div id="messages"></div>
    <div id="typing-indicator"></div>

    <div class="input-area">
      <textarea id="msg-input" rows="1" placeholder="메시지 입력... (Enter로 전송)"></textarea>
      <button class="btn-send" onclick="sendMessage()">전송</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myUsername = '';
  let myRoom = '';
  let typingTimer = null;
  let isTyping = false;

  // ── JOIN ──
  function joinChat() {
    const username = document.getElementById('input-username').value.trim();
    const room = document.getElementById('input-room').value.trim() || 'general';
    if (!username) return alert('닉네임을 입력하세요.');

    myUsername = username;
    myRoom = room;
    socket.emit('join', { username, room });
  }

  socket.on('joined', ({ username, room }) => {
    document.getElementById('sidebar-room').textContent = room;
    document.getElementById('header-room').textContent = room;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('msg-input').focus();
  });

  // ── LEAVE ──
  function leaveChat() {
    location.reload();
  }

  // ── MESSAGES ──
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('message', { text });
    input.value = '';
    input.style.height = 'auto';
    stopTyping();
  }

  socket.on('message', (data) => {
    appendMessage(data);
  });

  socket.on('system', ({ message, timestamp }) => {
    const div = document.createElement('div');
    div.className = 'msg-system';
    div.textContent = message;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
  });

  function appendMessage({ id, username, text, timestamp, socketId }) {
    const msgs = document.getElementById('messages');
    const isMine = username === myUsername;
    const timeStr = new Date(timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    const group = document.createElement('div');
    group.className = 'msg-group' + (isMine ? ' mine' : '');

    if (!isMine) {
      const meta = document.createElement('div');
      meta.className = 'msg-meta' + (isMine ? ' mine' : '');
      meta.innerHTML = `<span class="username">${esc(username)}</span><span class="time">${timeStr}</span>`;
      group.appendChild(meta);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    group.appendChild(bubble);

    if (isMine) {
      const meta = document.createElement('div');
      meta.className = 'msg-meta mine';
      meta.innerHTML = `<span class="time">${timeStr}</span>`;
      group.appendChild(meta);
    }

    msgs.appendChild(group);
    scrollBottom();
  }

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── TYPING ──
  const msgInput = document.getElementById('msg-input');

  msgInput.addEventListener('input', () => {
    // Auto-resize
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';

    if (!isTyping) {
      isTyping = true;
      socket.emit('typing', true);
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(stopTyping, 1500);
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function stopTyping() {
    if (isTyping) {
      isTyping = false;
      socket.emit('typing', false);
    }
    clearTimeout(typingTimer);
  }

  const typingUsers = new Set();
  socket.on('typing', ({ username, isTyping: typing }) => {
    if (typing) typingUsers.add(username);
    else typingUsers.delete(username);
    updateTypingIndicator();
  });

  function updateTypingIndicator() {
    const el = document.getElementById('typing-indicator');
    if (typingUsers.size === 0) { el.textContent = ''; return; }
    const names = [...typingUsers].join(', ');
    el.textContent = `${names}님이 입력 중...`;
  }

  // ── ROOM USERS ──
  socket.on('roomUsers', ({ users }) => {
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    users.forEach(u => {
      const item = document.createElement('div');
      item.className = 'user-item' + (u === myUsername ? ' me' : '');
      item.innerHTML = `<span class="dot"></span><span>${esc(u)}${u === myUsername ? ' (나)' : ''}</span>`;
      list.appendChild(item);
    });
  });

  // ── ENTER KEY ON LOGIN ──
  document.getElementById('input-room').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });
  document.getElementById('input-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('input-room').focus();
  });
</script>
</body>
</html>
