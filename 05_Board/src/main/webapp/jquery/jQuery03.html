<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script>
        $(function () {

            let m1Visible = true;

            $("#b1").click(function () {
                if (m1Visible) {
                    $("#menu1").css("left", "0px")
                    m1Visible = false;
                } else {
                    $("#menu1").css("left", '-80px')
                    m1Visible = true;
                }
                m1Visible = !m1Visible;

            })
        })
    </script>
    <style>
        #menu1{
            position: fixed;
            left: -80px;
            transition: all 0.3s ease-out;
        }
    </style>
</head>
<body>
<button id="b1">menu1</button>
<div id="menu1" style="border: 1px solid; width: 80px">
    <div>
        <a href="https://www.naver.com">naver</a>
    </div>
    <div>
        <a href="https://www.daum.net">daum</a>
    </div>
    <div>
        <a href="https://www.google.com">google</a>
    </div>
</div>
</body>
</html>
