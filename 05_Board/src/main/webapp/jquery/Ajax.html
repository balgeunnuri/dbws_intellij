<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script>
        $(function (){
            $("#test-btn").click(function () {
                $.ajax({
                   type: "get",
                   url: "get-data",
                   data: {name: 'asd', age:10},
                   success: function (resData) {
                       console.log(resData)
                       console.log(JSON.stringify(resData))

                       $.each(resData.people, function (i, p) {
                           let content = `<h2>${p.name} / ${p.age}</h2>`
                           $("span").append(content);
                       })

                   }
                });
            });
        });

    </script>
    <script src="js/getjson.js" defer></script>
<!--    스크립트 태그 항상 밑에두는 습관 가지기-->
</head>
<body>
<button id="json-btn">get json~~</button>
<div class="result"></div>

<hr>
<button id="test-btn">test</button>
<span></span>
</body>
</html>
